<svg viewBox="0 0 640 440" xmlns="http://www.w3.org/2000/svg" class="network-svg" aria-hidden="true">
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Edges -->
  <g class="network-edges" fill="none">
    <!-- Hub-to-hub -->
    <line x1="310" y1="205" x2="168" y2="124"/>
    <line x1="310" y1="205" x2="450" y2="124"/>
    <line x1="310" y1="205" x2="124" y2="295"/>
    <line x1="310" y1="205" x2="490" y2="295"/>
    <line x1="310" y1="205" x2="238" y2="205"/>
    <line x1="310" y1="205" x2="382" y2="205"/>
    <line x1="310" y1="205" x2="228" y2="286"/>
    <line x1="310" y1="205" x2="390" y2="286"/>
    <line x1="168" y1="124" x2="124" y2="295"/>
    <line x1="450" y1="124" x2="490" y2="295"/>
    <line x1="168" y1="124" x2="238" y2="205"/>
    <line x1="450" y1="124" x2="382" y2="205"/>
    <line x1="124" y1="295" x2="228" y2="286"/>
    <line x1="490" y1="295" x2="390" y2="286"/>
    <!-- Medium ring -->
    <line x1="238" y1="205" x2="382" y2="205"/>
    <line x1="228" y1="286" x2="390" y2="286"/>
    <line x1="238" y1="205" x2="228" y2="286"/>
    <line x1="382" y1="205" x2="390" y2="286"/>
    <line x1="238" y1="205" x2="390" y2="286"/>
    <line x1="382" y1="205" x2="228" y2="286"/>
    <!-- Satellite connections -->
    <line x1="82"  y1="72"  x2="168" y2="124"/>
    <line x1="152" y1="52"  x2="168" y2="124"/>
    <line x1="226" y1="56"  x2="168" y2="124"/>
    <line x1="226" y1="56"  x2="238" y2="205"/>
    <line x1="358" y1="52"  x2="450" y2="124"/>
    <line x1="434" y1="50"  x2="450" y2="124"/>
    <line x1="526" y1="72"  x2="450" y2="124"/>
    <line x1="574" y1="172" x2="450" y2="124"/>
    <line x1="574" y1="172" x2="490" y2="295"/>
    <line x1="572" y1="316" x2="490" y2="295"/>
    <line x1="492" y1="378" x2="490" y2="295"/>
    <line x1="492" y1="378" x2="390" y2="286"/>
    <line x1="310" y1="378" x2="228" y2="286"/>
    <line x1="310" y1="378" x2="390" y2="286"/>
    <line x1="124" y1="376" x2="124" y2="295"/>
    <line x1="124" y1="376" x2="228" y2="286"/>
    <line x1="52"  y1="296" x2="124" y2="295"/>
    <line x1="52"  y1="184" x2="124" y2="295"/>
    <line x1="52"  y1="184" x2="168" y2="124"/>
    <line x1="134" y1="202" x2="124" y2="295"/>
    <line x1="134" y1="202" x2="168" y2="124"/>
    <line x1="134" y1="202" x2="238" y2="205"/>
    <!-- Extra cross-links for density -->
    <line x1="168" y1="124" x2="310" y2="56"/>
    <line x1="450" y1="124" x2="310" y2="56"/>
    <line x1="82"  y1="72"  x2="152" y2="52"/>
    <line x1="526" y1="72"  x2="574" y2="172"/>
    <line x1="492" y1="378" x2="572" y2="316"/>
    <line x1="124" y1="376" x2="52"  y2="296"/>
  </g>

  <!-- Glow halos on hubs -->
  <g class="network-halos" fill="currentColor">
    <circle cx="310" cy="205" r="28" fill-opacity="0.06"/>
    <circle cx="168" cy="124" r="20" fill-opacity="0.05"/>
    <circle cx="450" cy="124" r="20" fill-opacity="0.05"/>
  </g>

  <!-- Nodes -->
  <g class="network-nodes" fill="currentColor">
    <!-- Satellites -->
    <circle cx="82"  cy="72"  r="3.5"/>
    <circle cx="152" cy="52"  r="3.5"/>
    <circle cx="226" cy="56"  r="3.5"/>
    <circle cx="310" cy="56"  r="3.5"/>
    <circle cx="358" cy="52"  r="3.5"/>
    <circle cx="434" cy="50"  r="3.5"/>
    <circle cx="526" cy="72"  r="3.5"/>
    <circle cx="574" cy="172" r="3.5"/>
    <circle cx="572" cy="316" r="3.5"/>
    <circle cx="492" cy="378" r="3.5"/>
    <circle cx="310" cy="378" r="3.5"/>
    <circle cx="124" cy="376" r="3.5"/>
    <circle cx="52"  cy="296" r="3.5"/>
    <circle cx="52"  cy="184" r="3.5"/>
    <circle cx="134" cy="202" r="3.5"/>
    <!-- Medium -->
    <circle cx="238" cy="205" r="5.5"/>
    <circle cx="382" cy="205" r="5.5"/>
    <circle cx="228" cy="286" r="5.5"/>
    <circle cx="390" cy="286" r="5.5"/>
    <!-- Hubs -->
    <circle cx="124" cy="295" r="7"   class="network-hub" style="animation-delay:-1.4s"/>
    <circle cx="490" cy="295" r="7"   class="network-hub" style="animation-delay:-2.8s"/>
    <circle cx="168" cy="124" r="8"   class="network-hub" style="animation-delay:-0.6s"/>
    <circle cx="450" cy="124" r="8"   class="network-hub" style="animation-delay:-3.5s"/>
    <!-- Central hub -->
    <circle cx="310" cy="205" r="10.5" class="network-hub network-center"/>
  </g>
</svg>
