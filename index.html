<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiroto Fukada</title>
  <meta name="description" content="Portfolio of Hiroto Fukada" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 id="profile-name">Hiroto Fukada</h1>
      <p id="profile-tagline" class="tagline"></p>
      <nav>
        <a href="#about">About</a>
        <a href="#work">Selected Work</a>
        <a href="#experience">Experience</a>
        <a href="#education">Education</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="about" class="section">
      <div class="container">
        <h2>About</h2>
        <p id="profile-about"></p>
      </div>
    </section>

    <section id="work" class="section">
      <div class="container">
        <h2>Selected Work</h2>

        <div class="work-category">
          <h3>Research Outputs</h3>
          <ul id="research-outputs" class="work-list"></ul>
        </div>

        <div class="work-category">
          <h3>Upcoming Presentations</h3>
          <ul id="upcoming-presentations" class="work-list"></ul>
        </div>

        <div class="work-category">
          <h3>Professional Works</h3>
          <ul id="professional-works" class="work-list"></ul>
        </div>
      </div>
    </section>

    <section id="experience" class="section">
      <div class="container">
        <h2>Experience</h2>
        <div id="experience-list"></div>
      </div>
    </section>

    <section id="education" class="section">
      <div class="container">
        <h2>Education</h2>
        <div id="education-list"></div>
      </div>
    </section>

    <section id="contact" class="section">
      <div class="container">
        <h2>Contact</h2>
        <ul id="contact-list"></ul>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© Hiroto Fukada</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
